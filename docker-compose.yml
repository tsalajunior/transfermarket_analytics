services:
  postgres:
    image: postgres:16
    container_name: tm_postgres
    environment:
      POSTGRES_USER: tm_user
      POSTGRES_PASSWORD: tm_pass
      POSTGRES_DB: transfermarkt_analytics
    ports:
      - "5432:5432"
    volumes:
      - tm_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tm.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: '"local"' 
      PGADMIN_LISTEN_PORT: 8080
    ports:
      - "5050:8080"
    depends_on:
      - postgres

volumes:
  tm_pgdata:
